<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Sumate a mi convoy en Convoyar">
  <defs>
    <linearGradient id="ogBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a1f27"/>
      <stop offset="1" stop-color="#14181d"/>
    </linearGradient>
    <radialGradient id="ogGlow" cx="0.78" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#ffb53f" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#ffb53f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ogTile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f262f"/>
      <stop offset="1" stop-color="#171c22"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#ogBg)"/>
  <rect width="1200" height="630" fill="url(#ogGlow)"/>

  <!-- ruta decorativa que cruza el fondo -->
  <path d="M-40 560 C 260 470 420 600 640 470 S 1040 300 1260 360" fill="none"
        stroke="#2a333e" stroke-width="10" stroke-linecap="round"/>
  <path d="M-40 560 C 260 470 420 600 640 470 S 1040 300 1260 360" fill="none"
        stroke="#404b57" stroke-width="4" stroke-linecap="round" stroke-dasharray="2 22"/>

  <!-- bloque de texto -->
  <text x="80" y="150" font-family="'Segoe UI','Helvetica Neue',Helvetica,Arial,sans-serif"
        font-size="30" font-weight="800" letter-spacing="6" fill="#ffb53f">CONVOYAR</text>

  <text x="76" y="290" font-family="'Segoe UI','Helvetica Neue',Helvetica,Arial,sans-serif"
        font-size="94" font-weight="800" letter-spacing="-2" fill="#ecf1f5">Sumate a</text>
  <text x="76" y="392" font-family="'Segoe UI','Helvetica Neue',Helvetica,Arial,sans-serif"
        font-size="94" font-weight="800" letter-spacing="-2" fill="#ecf1f5">mi convoy</text>

  <text x="80" y="470" font-family="'Segoe UI','Helvetica Neue',Helvetica,Arial,sans-serif"
        font-size="30" font-weight="500" fill="#93a1b0">Coordinamos quien lleva a quien.</text>
  <text x="80" y="512" font-family="'Segoe UI','Helvetica Neue',Helvetica,Arial,sans-serif"
        font-size="30" font-weight="500" fill="#93a1b0">Gratis, para tu grupo o evento.</text>

  <!-- baldosa/icono a la derecha -->
  <g transform="translate(812 155)">
    <rect width="320" height="320" rx="74" fill="url(#ogTile)" stroke="#2c3540" stroke-width="2"/>
    <g transform="translate(20 20) scale(0.546875)">
      <path d="M148 372 C 216 300 208 212 364 150" fill="none" stroke="#2b333e" stroke-width="62" stroke-linecap="round"/>
      <path d="M148 372 C 216 300 208 212 364 150" fill="none" stroke="#5b6675" stroke-width="8" stroke-linecap="round" stroke-dasharray="2 30"/>
      <circle cx="148" cy="372" r="34" fill="#ffb53f"/>
      <circle cx="223" cy="257" r="23" fill="#edf1f4"/>
      <rect x="332" y="118" width="64" height="64" rx="15" fill="#46b878"/>
    </g>
  </g>
</svg>
