<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" fill="none" role="img" aria-labelledby="t">
  <title id="t">Todavia no hay viajes armados</title>
  <g stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
    <!-- horizonte -->
    <path d="M96 74 L224 74" stroke-width="3" opacity="0.18"/>
    <!-- bordes de la ruta en fuga -->
    <path d="M100 184 L150 78" stroke-width="5" opacity="0.5"/>
    <path d="M220 184 L170 78" stroke-width="5" opacity="0.5"/>
    <!-- eje central discontinuo -->
    <path d="M160 184 L160 80" stroke-width="6" opacity="0.4" stroke-dasharray="12 16"/>
  </g>
  <!-- ruta lista, todavia sin convoy: origen (naranja) y destino (verde) -->
  <circle cx="160" cy="174" r="8" fill="#ffb53f"/>
  <rect x="153" y="78" width="14" height="14" rx="3.5" fill="#46b878"/>
</svg>
