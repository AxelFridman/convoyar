<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2732 2732" role="img" aria-label="Convoyar">
  <defs>
    <linearGradient id="cvBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#191f27"/>
      <stop offset="1" stop-color="#14181d"/>
    </linearGradient>
    <radialGradient id="cvGlow" cx="0.5" cy="0.42" r="0.5">
      <stop offset="0" stop-color="#ffb53f" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#ffb53f" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Lienzo cuadrado a sangre; capacitor-assets recorta al centro para cada aspecto,
       por eso todo el contenido vive en la banda central. -->
  <rect width="2732" height="2732" fill="url(#cvBg)"/>
  <rect width="2732" height="2732" fill="url(#cvGlow)"/>

  <!-- rutas de fondo, muy sutiles -->
  <g fill="none" stroke="#2a333e" stroke-width="14" stroke-linecap="round" opacity="0.5">
    <path d="M-100 2000 C 700 1650 900 2050 1500 1750 S 2400 1500 2900 1650"/>
    <path d="M-100 820 C 500 640 900 760 1400 620 S 2300 520 2900 700" opacity="0.6"/>
  </g>

  <!-- baldosa de marca (icono) centrada -->
  <g transform="translate(1006 748)">
    <rect width="720" height="720" rx="170" fill="#1d232b" stroke="#2c3540" stroke-width="4"/>
    <g transform="scale(1.40625)">
      <path d="M148 372 C 216 300 208 212 364 150" fill="none" stroke="#232b35" stroke-width="62" stroke-linecap="round"/>
      <path d="M148 372 C 216 300 208 212 364 150" fill="none" stroke="#5b6675" stroke-width="8" stroke-linecap="round" stroke-dasharray="2 30"/>
      <circle cx="148" cy="372" r="34" fill="#ffb53f"/>
      <circle cx="223" cy="257" r="23" fill="#edf1f4"/>
      <rect x="332" y="118" width="64" height="64" rx="15" fill="#46b878"/>
    </g>
  </g>

  <!-- wordmark + tagline (fuentes del sistema; ver nota en docs/marca.md) -->
  <text x="1366" y="1690" text-anchor="middle"
        font-family="'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="248" font-weight="800" letter-spacing="-4" fill="#ecf1f5">Convoyar</text>
  <text x="1366" y="1806" text-anchor="middle"
        font-family="'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="82" font-weight="600" letter-spacing="2" fill="#ffb53f">Armamos tu convoy</text>
</svg>
